name: Bug report
description: Report a reproducible problem
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: A short description of the bug.
      placeholder: "Crash when opening the fleet view"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a step-by-step list.
      placeholder: |
        1. Go to...
        2. Click...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add relevant console logs or screenshots.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - apps/web
        - packages/core
        - packages/data
        - packages/nostr
        - packages/store
        - packages/map
        - docs
        - other
    validations:
      required: true
